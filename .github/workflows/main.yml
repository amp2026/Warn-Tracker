name: WARN Data Build

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 6am UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install warn-scraper warn-transformer pandas requests beautifulsoup4 html5lib pdfplumber openpyxl pyquery

      # ── Primary source: warn-scraper covers 40 states + DC ──────────────
      # WA excluded: built-in scraper has a while-True pagination loop → hangs.
      #    WA is fetched separately below via scripts/fetch_wa.py.
      # LA excluded: requires ZYTE_API_KEY — hard-crashes without it.
      # TX excluded: blocks GitHub Actions IPs → raises "Scraper isn't scraping."
      #    Both LA/TX hard-crash the process, skipping all states listed after them.
      - name: Scrape all supported states (warn-scraper)
        # Some state sites timeout or change structure — don't let one bad state
        # kill the whole run. The transformer will work with whatever was saved.
        continue-on-error: true
        run: |
          warn-scraper \
            AK AL AZ CA CO CT DC DE FL GA HI IA ID IL IN KS KY \
            MD ME MI MO MT NE NJ NM NY OH OK OR PA RI SC SD TN UT VA VT WI \
            --data-dir ./data/raw/

      # ── WA: custom scraper with proper last-page detection ───────────────
      - name: Fetch Washington State (custom scraper)
        run: python scripts/fetch_wa.py

      # Save a copy of the committed historical CSV before warn-transformer
      # overwrites data/processed/consolidated.csv with today's scrape only.
      # This lets the merge step union today's data with accumulated history.
      - name: Preserve historical data
        run: |
          if [ -f data/processed/consolidated.csv ]; then
            cp data/processed/consolidated.csv data/processed/consolidated_history.csv
            echo "Saved $(wc -l < data/processed/consolidated_history.csv) historical rows"
          fi

      - name: Transform & consolidate (warn-transformer)
        # Only run if at least one raw CSV was produced
        run: |
          if ls ./data/raw/*.csv 1>/dev/null 2>&1; then
            warn-transformer consolidate --data-dir ./data/raw/ --output-dir ./data/processed/ \
              || echo "warn-transformer had errors; will use whatever was produced"
          else
            echo "No raw CSVs found — skipping consolidation (will use existing data)"
          fi

      # ── Supplementary: direct state-site scrapers for unsupported states ──
      # MA  → mass.gov CSV download
      # NC  → nccommerce.com HTML/Excel
      # WV  → workforcewv.org HTML listing
      # MS  → mdes.ms.gov HTML table
      # NV  → detr.nv.gov PDF (pdfplumber)
      # NH  → nhes.nh.gov individual notice PDFs (pdfplumber)
      # AR/WY → no public data (state law)
      - name: Fetch missing states (direct scrapers)
        run: python scripts/fetch_missing_states.py

      # ── PDF-sourced states (MN, ND) ──────────────────────────────────────
      # Fallback for MN/ND when their state sites publish only PDFs.
      # Records tagged source_quality="pdf_sourced" (lower precision).
      - name: Fetch PDF-sourced states (MN, ND)
        run: python scripts/fetch_pdf_sourced.py

      # ── Merge all sources and normalize column names ──────────────────────
      - name: Merge and normalize
        run: |
          python - <<'EOF'
          import pandas as pd, os

          primary      = "data/processed/consolidated.csv"
          history      = "data/processed/consolidated_history.csv"
          supplement   = "data/processed/missing_states.csv"
          pdf_src      = "data/processed/pdf_sourced_states.csv"

          frames = []

          def load(path, default_quality, label):
              if not os.path.exists(path):
                  return
              df = pd.read_csv(path)
              if "source_quality" not in df.columns:
                  df["source_quality"] = default_quality
              print(f"{label}: {len(df)} records")
              frames.append(df)

          # Priority order matters for dedup (higher priority = lower rank number)
          load(primary,    "csv",          "warn-scraper + WA (today)")
          load(history,    "csv",          "Historical archive (accumulated)")
          load(supplement, "html_scraped", "Direct state scrapers (MA NC WV MS NV NH)")
          load(pdf_src,    "pdf_sourced",  "PDF-sourced (MN ND)")

          if not frames:
              print("WARNING: no new data; keeping existing consolidated.csv unchanged")
              raise SystemExit(0)

          df = pd.concat(frames, ignore_index=True)

          # Normalize column names
          df.columns = [c.lower().replace(" ", "_").replace("-", "_") for c in df.columns]
          renames = {
              "jobs":            "workers",
              "no_of_employees": "workers",
              "employees":       "workers",
              "layoffs":         "workers",
              "warn_type":       "type",
              "classification":  "type",
          }
          df = df.rename(columns=renames)
          for col in ("state", "company", "workers", "date", "city", "type",
                      "source_quality"):
              if col not in df.columns:
                  df[col] = None

          df["workers"] = pd.to_numeric(df["workers"], errors="coerce").fillna(0).astype(int)
          df["date"]    = pd.to_datetime(df["date"], errors="coerce")
          df = df.dropna(subset=["date"])

          # Dedup: prefer higher-quality source when same record appears in multiple
          quality_rank = {"csv": 0, "html_scraped": 1, "pdf_sourced": 2}
          df["_rank"] = df["source_quality"].map(quality_rank).fillna(9)
          df = df.sort_values("_rank")
          before = len(df)
          df = df.drop_duplicates(subset=["company", "state", "date", "workers"],
                                  keep="first")
          df = df.drop(columns=["_rank"])
          print(f"Deduped: {before} → {len(df)} records")

          for sq, grp in df.groupby("source_quality", dropna=False):
              states = sorted(grp["state"].dropna().unique().tolist())
              print(f"  {sq}: {len(grp)} records  states={states}")

          df = df.sort_values("date", ascending=False).reset_index(drop=True)
          df.to_csv(primary, index=False)
          print(f"Final: {len(df)} records saved to {primary}")

          for path in (supplement, pdf_src, history):
              if os.path.exists(path):
                  os.remove(path)
          EOF

      - name: Commit and push data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/processed/consolidated.csv
          git commit -m "Update WARN data [skip ci]" || echo "No changes to commit"
          git push
