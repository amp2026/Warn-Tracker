name: WARN Data Build

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 6am UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install warn-scraper warn-transformer pandas requests beautifulsoup4 html5lib pdfplumber openpyxl

      # ── Primary source: warn-scraper covers 40 states + DC ──────────────
      # WA (Washington) is excluded: its built-in scraper has a while-True
      # pagination loop with no last-page detection — it hangs for 30+ minutes.
      # WA is fetched separately below via scripts/fetch_wa.py.
      - name: Scrape all supported states (warn-scraper)
        # Some state sites timeout or change structure — don't let one bad state
        # kill the whole run. The transformer will work with whatever was saved.
        run: |
          warn-scraper \
            AK AL AZ CA CO CT DC DE FL GA HI IA ID IL IN KS KY LA \
            MD ME MI MO MT NE NJ NM NY OH OK OR PA RI SC SD TN TX UT VA VT WI \
            --data-dir ./data/raw/ \
          || echo "warn-scraper finished with errors; continuing with partial data"

      # ── WA: custom scraper with proper last-page detection ───────────────
      - name: Fetch Washington State (custom scraper)
        run: python scripts/fetch_wa.py

      - name: Transform & consolidate (warn-transformer)
        # Only run if at least one raw CSV was produced
        run: |
          if ls ./data/raw/*.csv 1>/dev/null 2>&1; then
            warn-transformer consolidate --data-dir ./data/raw/ --output-dir ./data/processed/ \
              || echo "warn-transformer had errors; will use whatever was produced"
          else
            echo "No raw CSVs found — skipping consolidation (will use existing data)"
          fi

      # ── Supplementary: direct state-site scrapers for unsupported states ──
      # MA  → mass.gov CSV download
      # NC  → nccommerce.com HTML/Excel
      # WV  → workforcewv.org HTML listing
      # MS  → mdes.ms.gov HTML table
      # NV  → detr.nv.gov PDF (pdfplumber)
      # AR/WY → no public data (state law); MN/NH/ND → no bulk source found
      - name: Fetch missing states (direct scrapers)
        run: python scripts/fetch_missing_states.py

      # ── Merge both sources and normalize column names ────────────────────
      - name: Merge and normalize
        run: |
          python - <<'EOF'
          import pandas as pd, os, glob

          primary = "data/processed/consolidated.csv"
          supplement = "data/processed/missing_states.csv"

          frames = []

          # Load warn-scraper output
          if os.path.exists(primary):
              df_main = pd.read_csv(primary)
              print(f"warn-scraper: {len(df_main)} records from {primary}")
              frames.append(df_main)
          else:
              print("WARNING: no consolidated.csv from warn-scraper")

          # Load WARN Firehose supplementary data (10 states not in warn-scraper)
          if os.path.exists(supplement):
              df_supp = pd.read_csv(supplement)
              print(f"WARN Firehose (missing states): {len(df_supp)} records")
              frames.append(df_supp)

          if not frames:
              # Fall back to existing consolidated.csv so the app keeps working
              print("WARNING: no new data; keeping existing consolidated.csv unchanged")
              raise SystemExit(0)

          df = pd.concat(frames, ignore_index=True)

          # Normalize column names across both sources
          df.columns = [c.lower().replace(" ", "_").replace("-", "_") for c in df.columns]

          renames = {
              "jobs":            "workers",
              "no_of_employees": "workers",
              "employees":       "workers",
              "layoffs":         "workers",
              "warn_type":       "type",
              "classification":  "type",
          }
          df = df.rename(columns=renames)

          for col in ("state", "company", "workers", "date", "city", "type"):
              if col not in df.columns:
                  df[col] = None

          df["workers"] = pd.to_numeric(df["workers"], errors="coerce").fillna(0).astype(int)
          df["date"]    = pd.to_datetime(df["date"], errors="coerce")
          df = df.dropna(subset=["date"])

          # Drop duplicates (same company + state + date + workers)
          before = len(df)
          df = df.drop_duplicates(subset=["company", "state", "date", "workers"], keep="first")
          print(f"Deduped: {before} → {len(df)} records")

          df = df.sort_values("date", ascending=False).reset_index(drop=True)
          df.to_csv(primary, index=False)
          print(f"Final: {len(df)} records saved to {primary}")
          print(f"States covered: {sorted(df['state'].dropna().unique().tolist())}")

          # Clean up temp file
          if os.path.exists(supplement):
              os.remove(supplement)
          EOF

      - name: Commit and push data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/processed/consolidated.csv
          git commit -m "Update WARN data [skip ci]" || echo "No changes to commit"
          git push
