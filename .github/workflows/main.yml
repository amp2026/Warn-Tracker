name: WARN Scratch Build

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install BLN Tools
        run: pip install warn-scraper warn-transformer

      - name: Step 1: Extract
        run: warn-scraper all --data-dir ./data/raw/

      - name: Step 2: Transform
        run: warn-transformer consolidate --data-dir ./data/raw/ --output-dir ./data/processed/

      - name: Step 3: Load
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/processed/consolidated.csv
          git commit -m "Update consolidated WARN data" || exit 0
          git push
