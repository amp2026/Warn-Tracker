name: WARN Data Build

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 6am UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl

      # ── Single source of truth: Excel spreadsheets ───────────────────────
      # data/raw/warn_2026.xlsx        – 2026 WARN notices
      # data/raw/warn_master.xlsx      – All WARN notices prior to 2026
      # The script normalises both files and writes data/processed/consolidated.csv
      - name: Build consolidated CSV from Excel files
        run: python scripts/build_from_excel.py

      - name: Commit and push data
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/processed/last_updated.txt
          git add data/processed/consolidated.csv data/processed/last_updated.txt
          git commit -m "Update WARN data [skip ci]" || echo "No changes to commit"
          git push
